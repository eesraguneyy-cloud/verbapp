<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>esracademiapp — Verbos Turcos 🇹🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
:root {
  --primary:#4F6AF5; --primary-dark:#3451d1; --primary-bg:#eef1ff;
  --purple:#7C3AED; --coral:#FF4B4B; --blue:#1CB0F6; --gold:#FFC800;
  --mint:#00CD9C; --orange:#FF9600;
  --bg:#f8f9ff; --bg-card:#ffffff; --text:#1e1b4b; --text-muted:#6b7280;
  --border:#e5e7eb; --border-light:#f3f4f6;
  --radius:16px; --radius-sm:10px; --radius-pill:999px;
  --shadow:0 2px 12px rgba(79,106,245,.1);
}
[data-theme="dark"] {
  --bg:#0f0f1a; --bg-card:#1a1a2e; --text:#e8e8f0; --text-muted:#9ca3af;
  --border:#2d2d44; --border-light:#22223a; --primary-bg:#1a1a35;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); font-size:16px; line-height:1.5 }

/* ── Header ── */
header {
  background:var(--bg-card); border-bottom:2px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:10px; cursor:pointer }
.app-logo { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#4F6AF5,#7C3AED); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:1rem }
.app-title { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; color:var(--text) }
.app-subtitle { font-size:.72rem; color:var(--text-muted) }
.header-right { display:flex; align-items:center; gap:8px }
.btn-icon { background:var(--bg); border:2px solid var(--border); border-radius:var(--radius-pill); padding:6px 12px; cursor:pointer; font-size:.82rem; font-weight:700; color:var(--text); white-space:nowrap }
.btn-icon:hover { border-color:var(--primary); color:var(--primary) }

/* ── Nav ── */
nav {
  background:var(--bg-card); border-bottom:2px solid var(--border);
  display:flex; overflow-x:auto; position:sticky; top:58px; z-index:99;
}
nav::-webkit-scrollbar { display:none }
.nav-tab {
  flex:1; min-width:70px; padding:10px 6px 8px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  border:none; background:none; cursor:pointer; color:var(--text-muted);
  font-size:.68rem; font-weight:700; white-space:nowrap; border-bottom:3px solid transparent;
  transition:all .15s;
}
.nav-tab.active { color:var(--primary); border-bottom-color:var(--primary) }
.nav-tab-icon { font-size:1.2rem }

/* ── Page wrap ── */
.page-wrap { max-width:800px; margin:0 auto; padding:16px }

/* ── Hero ── */
.home-hero {
  background:linear-gradient(135deg,#4F6AF5 0%,#7C3AED 100%);
  border-radius:var(--radius); padding:24px 20px; margin-bottom:16px; color:#fff;
}
.home-hero-flag { font-size:1.5rem }
.home-hero-title { font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800; margin:6px 0 4px }
.home-hero-sub { font-size:.88rem; opacity:.9; margin-bottom:14px }
.hero-xp-bar-wrap { margin-bottom:14px }
.hero-xp-label { display:flex; justify-content:space-between; font-size:.78rem; font-weight:700; margin-bottom:4px }
.hero-xp-track { height:10px; background:rgba(255,255,255,.3); border-radius:999px; overflow:hidden }
.hero-xp-fill  { height:100%; background:#fff; border-radius:999px; transition:width .4s }
.hero-stats { display:flex; gap:12px }
.hero-stat { text-align:center; flex:1 }
.hero-stat-val { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800 }
.hero-stat-lbl { font-size:.7rem; opacity:.8 }

/* ── Quick buttons ── */
.home-quick-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap }
.quick-btn { flex:1; min-width:90px; padding:10px 8px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg-card); font-size:.82rem; font-weight:700; cursor:pointer; color:var(--text); transition:all .15s }
.quick-btn:hover { border-color:var(--primary); color:var(--primary) }

/* ── Daily challenge banner ── */
.dc-banner { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; cursor:pointer; gap:10px }
.dc-banner:hover { border-color:var(--primary) }
.dc-banner-title { font-weight:800; font-size:.95rem; color:var(--text) }
.dc-banner-verb  { font-size:.82rem; color:var(--text-muted); margin-top:2px }
.dc-banner-btn   { padding:8px 16px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:800; font-size:.85rem; cursor:pointer; white-space:nowrap }
.dc-banner-btn.completed { background:var(--mint) }

/* ── Level cards ── */
.levels-grid { display:grid; gap:14px }
.level-card { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:18px }
.level-card.active { border-color:var(--primary) }
.level-card.locked { opacity:.6 }
.level-card-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px }
.level-badge { display:inline-block; padding:3px 10px; border-radius:var(--radius-pill); font-weight:800; font-size:.78rem; background:var(--primary); color:#fff }
.level-badge.n2 { background:var(--purple) }
.level-title { font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:800; color:var(--text); margin-top:4px }
.level-sub { font-size:.78rem; color:var(--text-muted) }
.level-steps { display:flex; flex-direction:column; gap:8px; margin-bottom:14px }
.level-step { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg) }
.level-step.step-active { border-color:var(--primary); background:var(--primary-bg) }
.step-num { width:28px; height:28px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.85rem; flex-shrink:0; color:var(--text-muted) }
.step-active .step-num { background:var(--primary); color:#fff }
.step-body { flex:1 }
.step-name { font-weight:800; font-size:.88rem; color:var(--text) }
.step-desc { font-size:.75rem; color:var(--text-muted) }
.step-track { height:5px; background:var(--border); border-radius:999px; overflow:hidden; margin-top:4px }
.step-fill { height:100%; background:var(--primary); border-radius:999px }
.step-pct { font-size:.75rem; font-weight:700; color:var(--text-muted); min-width:32px; text-align:right }
.level-start-btn { width:100%; padding:11px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:800; font-size:.95rem; cursor:pointer }

/* ── Unit view ── */
.unit-back-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px }
.btn-back { padding:7px 14px; border-radius:var(--radius-pill); border:2px solid var(--border); background:var(--bg-card); font-weight:700; font-size:.85rem; cursor:pointer; color:var(--text) }
.unit-pills { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap }
.unit-pill { padding:7px 16px; border-radius:var(--radius-pill); border:2px solid var(--border); background:var(--bg); font-weight:700; font-size:.85rem; cursor:pointer; color:var(--text-muted) }
.unit-pill.active { background:var(--primary); border-color:var(--primary); color:#fff }
.unit-tabs { display:flex; gap:6px; margin-bottom:16px }
.tab-btn { padding:8px 18px; border-radius:var(--radius-pill); border:2px solid var(--border); background:var(--bg); font-weight:700; font-size:.88rem; cursor:pointer; color:var(--text-muted) }
.tab-btn.active { background:var(--primary); border-color:var(--primary); color:#fff }
.hidden { display:none !important }

/* ── Theory ── */
.theory-section { display:flex; flex-direction:column; gap:14px }
.theory-section-title { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; color:var(--text) }
.theory-note-box { background:var(--primary-bg); border-left:4px solid var(--primary); border-radius:var(--radius-sm); padding:14px 16px; font-size:.9rem; color:var(--text) }
.tr-theory-box { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:18px 20px }
.tr-theory-title { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; color:var(--text); margin-bottom:12px }
.theory-table-wrap { overflow-x:auto }
.theory-table { border-collapse:collapse; width:100%; font-size:.85rem }
.theory-table th { background:var(--bg); padding:8px 12px; text-align:left; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); border-bottom:2px solid var(--border) }
.theory-table td { padding:8px 12px; border-bottom:1px solid var(--border-light) }
.theory-table tr:last-child td { border-bottom:none }
.theory-table tr:hover td { background:var(--primary-bg) }

/* ── Verb chips (unit cards) ── */
.vc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; padding:4px }
.verb-chip { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; transition:all .15s }
.verb-chip:hover { border-color:var(--primary); transform:translateY(-2px); box-shadow:var(--shadow) }
.vc-head { display:flex; align-items:center; gap:6px; padding:8px 10px; flex-wrap:nowrap }
.vc-inf  { font-family:'Baloo 2',cursive; font-size:.9rem; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0 }
.vc-tr   { font-size:.72rem; color:rgba(255,255,255,.9); font-style:italic; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.vc-forms { padding:6px 8px }
.vc-row  { display:flex; align-items:center; padding:2px 0; border-bottom:1px solid var(--border-light); gap:6px }
.vc-row:last-child { border-bottom:none }
.vc-pron { font-size:.72rem; font-weight:700; color:var(--text-muted); width:44px; flex-shrink:0 }
.vc-form { font-size:.85rem; font-weight:700; color:var(--primary-dark) }

/* ── Exercises ── */
.ex-selector { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:16px }
.ex-selector-title { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; color:var(--text); margin-bottom:14px }
.ex-type-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px }
.ex-type-card { background:var(--bg); border:2px solid var(--border); border-radius:var(--radius-sm); padding:14px; cursor:pointer; transition:all .15s }
.ex-type-card:hover { border-color:var(--primary); background:var(--primary-bg) }
.ex-type-name { font-weight:800; font-size:.9rem; color:var(--text); margin-bottom:4px }
.ex-type-desc { font-size:.78rem; color:var(--text-muted); margin-bottom:10px }
.ex-type-btn  { padding:6px 14px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:700; font-size:.82rem; cursor:pointer }
.ex-question-box { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px }
.ex-progress-bar { height:6px; background:var(--border); border-radius:999px; overflow:hidden; margin-bottom:10px }
.ex-progress-fill { height:100%; background:var(--primary); border-radius:999px; transition:width .3s }
.ex-counter { font-size:.78rem; color:var(--text-muted); font-weight:700; margin-bottom:12px }
.ex-prompt { font-size:.95rem; font-weight:700; color:var(--text); margin-bottom:10px }
.ex-verb-display { background:var(--primary-bg); border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap }
.ex-verb-inf { font-family:'Baloo 2',cursive; font-size:1.3rem; font-weight:800; color:var(--primary-dark) }
.ex-verb-tr  { font-size:.9rem; color:var(--text-muted); font-style:italic }
.ex-pron-hint { font-size:.9rem; font-weight:700; color:var(--text); margin-bottom:10px }
.ex-input { width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg); font-size:.95rem; font-weight:700; color:var(--text); outline:none }
.ex-input:focus { border-color:var(--primary) }
.inp-correct { border-color:var(--mint) !important; background:#f0fdf4 !important }
.inp-wrong   { border-color:var(--coral) !important; background:#fff5f5 !important }
.ex-feedback { margin-top:8px; font-weight:700; font-size:.95rem; min-height:22px }
.fb-ok  { color:#18A34A }
.fb-err { color:var(--coral) }
.ex-mc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px }
.ex-mc-btn  { padding:12px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg-card); font-weight:700; font-size:.88rem; cursor:pointer; color:var(--text); transition:all .15s }
.ex-mc-btn:hover { border-color:var(--primary); color:var(--primary) }
.mc-correct { border-color:var(--mint) !important; background:#f0fdf4 !important; color:#18A34A !important }
.mc-wrong   { border-color:var(--coral) !important; background:#fff5f5 !important; color:var(--coral) !important }
.ex-match-wrap { display:flex; gap:16px; margin:12px 0 }
.ex-match-col  { display:flex; flex-direction:column; gap:8px; flex:1 }
.ex-match-card { padding:10px 14px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg-card); font-weight:700; font-size:.88rem; cursor:pointer; color:var(--text); transition:all .15s; text-align:center }
.ex-match-card.selected { border-color:var(--primary); background:var(--primary-bg); color:var(--primary) }
.ex-match-card.paired   { border-color:var(--mint); background:#f0fdf4; color:#18A34A }
.ex-result-box { text-align:center; padding:32px; background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius) }
.ex-result-score { font-family:'Baloo 2',cursive; font-size:3rem; font-weight:800; color:var(--primary) }
.ex-result-label { font-size:1.1rem; font-weight:800; color:var(--text); margin-bottom:6px }
.btn-primary { padding:11px 24px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:800; font-size:.95rem; cursor:pointer }

/* ── Flashcards ── */
.fc-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap }
.fc-select { padding:8px 12px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg-card); font-size:.85rem; font-weight:700; color:var(--text); cursor:pointer }
.fc-btn-shuffle { padding:8px 16px; border-radius:var(--radius-pill); border:2px solid var(--border); background:var(--bg-card); font-weight:700; font-size:.85rem; cursor:pointer; color:var(--text) }
.fc-stats-bar { font-size:.82rem; color:var(--text-muted); font-weight:700; margin-bottom:12px }
.fc-card-wrap { display:flex; justify-content:center; margin-bottom:16px; perspective:1200px }
.fc-card { width:100%; max-width:400px; height:200px; cursor:pointer }
.fc-card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .4s }
.fc-card-front, .fc-card-back { position:absolute; inset:0; border-radius:var(--radius); backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; border:2px solid var(--border) }
.fc-card-front { background:linear-gradient(135deg,var(--primary),var(--purple)); color:#fff }
.fc-card-back  { background:var(--bg-card); transform:rotateY(180deg) }
.fc-word { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; text-align:center }
.fc-tipo { font-size:.8rem; opacity:.8; margin-top:4px }
.fc-card-hint { font-size:.75rem; opacity:.7; margin-top:12px }
.fc-translation { font-family:'Baloo 2',cursive; font-size:1.5rem; font-weight:800; color:var(--primary-dark); text-align:center }
.fc-actions { display:flex; justify-content:center; gap:12px; margin-bottom:14px }
.fc-action-unknown { padding:10px 24px; border-radius:var(--radius-pill); background:#fff5f5; border:2px solid var(--coral); color:var(--coral); font-weight:800; cursor:pointer }
.fc-action-known   { padding:10px 24px; border-radius:var(--radius-pill); background:#f0fdf4; border:2px solid var(--mint); color:#18A34A; font-weight:800; cursor:pointer }
.fc-done-wrap { text-align:center; padding:20px }
.fc-done-title { font-family:'Baloo 2',cursive; font-size:1.4rem; font-weight:800; color:var(--text); margin-bottom:12px }
.fc-btn-restart { padding:10px 24px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:800; cursor:pointer }

/* ── Verb search modal ── */
.vsearch-card { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; margin-bottom:8px }
.vsearch-card:hover { border-color:var(--primary) }
.vsearch-head { display:flex; align-items:center; gap:8px; padding:10px 12px }
.vsearch-inf  { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; color:#fff }
.vsearch-tr   { font-size:.82rem; color:rgba(255,255,255,.9); font-style:italic; flex:1 }
.vsearch-tipo { font-size:.72rem; color:rgba(255,255,255,.7); margin-left:auto }
.vsearch-forms { padding:8px 12px; display:flex; gap:16px; flex-wrap:wrap }
.vsearch-pair { display:flex; gap:6px; align-items:center; font-size:.82rem }
.vsearch-pron { color:var(--text-muted); font-weight:700; width:44px }
.vsearch-form { color:var(--primary-dark); font-weight:700 }
.vsearch-detail { }
.vsearch-detail-head { padding:16px 18px; border-radius:var(--radius-sm); margin-bottom:12px }
.vsearch-detail-inf { font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800; color:#fff; display:block; margin-bottom:4px }
.vsearch-detail-tr  { font-size:.95rem; color:rgba(255,255,255,.9); font-style:italic }
.vsearch-tense-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px }
.vsearch-tense-block { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius-sm); overflow:hidden }
.vsearch-tense-label { padding:6px 12px; font-weight:800; font-size:.8rem; color:#fff }
.vsearch-tense-block .vsearch-pair { padding:4px 12px; border-bottom:1px solid var(--border-light) }
.vsearch-tense-block .vsearch-pair:last-child { border-bottom:none }

/* ── Daily page ── */
.dp-hero { background:linear-gradient(135deg,#FF9600,#FF4B4B); border-radius:var(--radius); padding:20px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; color:#fff }
.dp-hero-title { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800 }
.dp-hero-sub { font-size:.82rem; opacity:.85; margin-top:2px }
.dp-streak-circle { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; flex-direction:column; align-items:center; justify-content:center; border:3px solid rgba(255,255,255,.5) }
.dp-streak-circle.dp-streak-active { background:rgba(255,255,255,.3); border-color:#fff }
.dp-streak-num { font-family:'Baloo 2',cursive; font-size:1.4rem; font-weight:800; line-height:1 }
.dp-streak-lbl { font-size:.62rem; opacity:.85 }
.dp-stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px }
.dp-stat { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius-sm); padding:12px 8px; text-align:center }
.dp-stat-icon { font-size:1.3rem; margin-bottom:4px }
.dp-stat-val  { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; color:var(--text) }
.dp-stat-lbl  { font-size:.65rem; color:var(--text-muted); font-weight:600 }
.dp-today { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px }
.dp-today-done { border-color:var(--mint) }
.dp-today-left { display:flex; align-items:center; gap:12px }
.dp-today-badge { font-size:1.8rem }
.dp-today-label { font-size:.78rem; color:var(--text-muted); font-weight:700 }
.dp-today-verb  { font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:800; color:var(--text) }
.dp-today-tr    { font-size:.82rem; color:var(--text-muted); font-style:italic }
.dp-today-status{ font-size:.78rem; color:var(--text-muted); margin-top:2px }
.dp-today-btn   { padding:9px 18px; border-radius:var(--radius-pill); background:var(--primary); color:#fff; border:none; font-weight:800; font-size:.85rem; cursor:pointer; white-space:nowrap }
.dp-cal-section { background:var(--bg-card); border:2px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px }
.cal-view-tabs { display:flex; gap:6px; margin-bottom:14px }
.cal-view-tab  { padding:6px 16px; border-radius:var(--radius-pill); border:2px solid var(--border); background:var(--bg); font-size:.84rem; font-weight:700; cursor:pointer; color:var(--text-muted) }
.cal-view-tab.active { background:var(--primary); border-color:var(--primary); color:#fff }

/* ============================================================
   CONJUGATION ENGINES
   ============================================================ */
function conjugarTR_Simdiki(trInf, pronIdx) {
  let inf = trInf.split('/')[0].trim().split('(')[0].trim();
  const parts = inf.split(' ');
  const lastWord = parts[parts.length-1];
  const prefix = parts.slice(0,-1).join(' ');
  let stem;
  if(lastWord.endsWith('mak')) stem=lastWord.slice(0,-3);
  else if(lastWord.endsWith('mek')) stem=lastWord.slice(0,-3);
  else return inf;
  if(stem.endsWith('t') && stem.length>1) stem=stem.slice(0,-1)+'d';
  const VOWELS='aeıioöuü';
  const IYOR_MAP={a:'ı',ı:'ı',e:'i',i:'i',o:'u',u:'u',ö:'ü',ü:'ü'};
  let harmV, base;
  if(VOWELS.includes(stem[stem.length-1])){
    let prevV=null;
    for(let j=stem.length-2;j>=0;j--){ if(VOWELS.includes(stem[j])){prevV=stem[j];break;} }
    harmV=IYOR_MAP[prevV||stem[stem.length-1]];
    base=stem.slice(0,-1)+harmV;
  } else {
    let lv='a';
    for(const c of stem){if(VOWELS.includes(c))lv=c;}
    harmV=IYOR_MAP[lv]; base=stem+harmV;
  }
  const root=base+'yor';
  const LERI={ı:'lar',i:'ler',u:'lar',ü:'ler'};
  const sfx=['um','sun','','uz','sunuz',LERI[harmV]||'lar'];
  return (prefix?prefix+' ':'')+root+sfx[pronIdx];
}

function conjugarTR_Gecmis(trInf, pronIdx) {
  let inf = trInf.split('/')[0].trim().split('(')[0].trim();
  const parts = inf.split(' ');
  const lastWord = parts[parts.length-1];
  const prefix = parts.slice(0,-1).join(' ');
  let stem;
  if(lastWord.endsWith('mak')) stem=lastWord.slice(0,-3);
  else if(lastWord.endsWith('mek')) stem=lastWord.slice(0,-3);
  else return inf;
  const VOWELS='aeıioöuü';
  let lastV='a';
  for(const c of stem){if(VOWELS.includes(c))lastV=c;}
  const VOICELESS='çfhkpsşt';
  const lastC=stem[stem.length-1];
  const useT=VOICELESS.includes(lastC);
  const HARM4={a:'ı',ı:'ı',e:'i',i:'i',o:'u',u:'u',ö:'ü',ü:'ü'};
  const diV=HARM4[lastV]||'i';
  const base=stem+(useT?'t':'d')+diV;
  const NZ_MAP={ı:'nız',i:'niz',u:'nuz',ü:'nüz'};
  const LAR_MAP={ı:'lar',i:'ler',u:'lar',ü:'ler'};
  const sfx=['m','n','','k',NZ_MAP[diV]||'niz',LAR_MAP[diV]||'ler'];
  return (prefix?prefix+' ':'')+base+sfx[pronIdx];
}

function conjugarTR_Genis(trInf, pronIdx) {
  let inf = trInf.split('/')[0].trim().split('(')[0].trim();
  const parts = inf.split(' ');
  const lastWord = parts[parts.length-1];
  const prefix = parts.slice(0,-1).join(' ');
  let stem;
  if(lastWord.endsWith('mak')) stem=lastWord.slice(0,-3);
  else if(lastWord.endsWith('mek')) stem=lastWord.slice(0,-3);
  else return inf;
  const VOWELS='aeıioöuü';
  let lastV='a';
  for(const c of stem){if(VOWELS.includes(c))lastV=c;}
  const HARM4={a:'ı',ı:'ı',e:'i',i:'i',o:'u',u:'u',ö:'ü',ü:'ü'};
  function gelisSfx(base){
    let bV='i';
    for(const c of base){if(VOWELS.includes(c))bV=c;}
    const hV=HARM4[bV]||'i';
    const LAR=(hV==='ı'||hV==='u')?'lar':'ler';
    return [hV+'m','s'+hV+'n','',hV+'z','s'+hV+'n'+hV+'z',LAR];
  }
  const IRRS={
    'al':'alır','bil':'bilir','bul':'bulur','dur':'durur',
    'gel':'gelir','git':'gider','gör':'görür','gül':'güler',
    'kal':'kalır','ol':'olur','öl':'ölür',
    'ver':'verir','vur':'vurur','duy':'duyar',
    'iç':'içer','geç':'geçer','kaç':'kaçar',
    'uç':'uçar','koş':'koşar','sat':'satar',
    'sor':'sorar','yaz':'yazar','yap':'yapar','aç':'açar',
    'kır':'kırar','giy':'giyer','bas':'basar','kes':'keser',
    'koy':'koyar','çek':'çeker','tut':'tutar',
    'dön':'döner','bin':'biner','çık':'çıkar',
    'düş':'düşer','sev':'sever','bak':'bakar',
  };
  if(IRRS[stem]){
    const base3=IRRS[stem];
    const sfx=gelisSfx(base3);
    return (prefix?prefix+' ':'')+base3+sfx[pronIdx];
  }
  const lastChar=stem[stem.length-1];
  let base;
  if(VOWELS.includes(lastChar)) base=stem+'r';
  else { const hV=HARM4[lastV]||'i'; base=stem+hV+'r'; }
  const sfx=gelisSfx(base);
  return (prefix?prefix+' ':'')+base+sfx[pronIdx];
}

/* ── Confetti ── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:80},()=>({
    x:Math.random()*canvas.width, y:-10,
    r:Math.random()*6+3, vx:(Math.random()-.5)*4, vy:Math.random()*3+2,
    color:['#4F6AF5','#7C3AED','#FF4B4B','#FFC800','#00CD9C'][Math.floor(Math.random()*5)],
    angle:0, spin:(Math.random()-.5)*.2
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=p.color; ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin; p.vy+=.05;
    });
    frame++;
    if(frame<90) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

}

function buildExArea(n) {
  const tenseMap={1:'simdiki',2:'gecmis',3:'genis'};
  const nameMap={1:'Presente Continuo (-iyor)',2:'Pasado Simple (-di/-ti)',3:'Presente Habitual (-ir/-er)'};
  const tense=tenseMap[n];
  return `
  <div class="ex-selector">
    <div class="ex-selector-title">✏️ Ejercicios — ${nameMap[n]}</div>
    <div class="ex-type-grid">
      ${[
        {id:'A',name:'A — Escribe la forma',desc:'Conjuga el verbo correctamente'},
        {id:'B',name:'B — ¿Qué significa?',desc:'Elige la traducción correcta al español'},
        {id:'C',name:'C — Ben/Sen/O...',desc:'Dado el pronombre, conjuga el verbo'},
        {id:'D',name:'D — Relacionar',desc:'Une pronombres con formas conjugadas'},
      ].map(t=>`
      <div class="ex-type-card" onclick="startEx('${tense}','${t.id}')">
        <div class="ex-type-name">${t.name}</div>
        <div class="ex-type-desc">${t.desc}</div>
        <button class="ex-type-btn">▶ Empezar</button>
      </div>`).join('')}
    </div>
  </div>
  <div id="ex-area"></div>`;
}

let EX = {tense:'simdiki',type:'A',q:0,score:0,total:10,done:false,_verb:null,_pIdx:0,_correct:''};

function startEx(tense, type) {
  EX = {tense,type,q:0,score:0,total:10,done:false};
  renderEx();
}

function getConjFn(tense) {
  if(tense==='simdiki') return conjugarTR_Simdiki;
  if(tense==='gecmis')  return conjugarTR_Gecmis;
  return conjugarTR_Genis;
}

function renderEx() {
  const area=document.getElementById('ex-area');
  if(!area) return;
  if(EX.done) {
    const pct=Math.round(EX.score/EX.total*100);
    area.innerHTML=`<div class="ex-result-box">
      <div class="ex-result-score">${pct}%</div>
      <div class="ex-result-label">${pct===100?'¡Perfecto! 🎉':pct>=70?'¡Bien hecho! 👍':'¡Sigue practicando! 💪'}</div>
      <div style="color:var(--text-muted);margin-bottom:16px">${EX.score}/${EX.total} correctas</div>
      <button class="btn-primary" onclick="startEx('${EX.tense}','${EX.type}')">🔄 Repetir</button>
    </div>`;
    if(pct===100){ addXP(10); launchConfetti(); }
    return;
  }

  // Pick unique verb each time (avoid repeats in a row)
  const verb = VERBOS_TR[Math.floor(Math.random()*VERBOS_TR.length)];
  const pIdx  = Math.floor(Math.random()*6);
  const fn    = getConjFn(EX.tense);
  const correct = fn(verb.inf, pIdx);
  EX._verb=verb; EX._pIdx=pIdx; EX._correct=correct;

  const tLabel={simdiki:'Şimdiki Zaman',gecmis:'Geçmiş Zaman',genis:'Geniş Zaman'}[EX.tense];

  let html=`<div class="ex-question-box">
    <div class="ex-progress-bar"><div class="ex-progress-fill" style="width:${EX.q/EX.total*100}%"></div></div>
    <div class="ex-counter">${EX.q+1} / ${EX.total}</div>`;

  if(EX.type==='A' || EX.type==='C') {
    html+=`
    <div class="ex-prompt">${EX.type==='A'?'Escribe la forma correcta de':'Dado el pronombre, conjuga el verbo en'} <strong>${tLabel}</strong>:</div>
    <div class="ex-verb-display">
      <span class="ex-verb-inf">${verb.inf}</span>
      <span class="ex-verb-tr">${verb.es}</span>
    </div>
    <div class="ex-pron-hint">Pronombre: <strong>${TR_PRONS[pIdx]}</strong> (${TR_PRONS_ES[pIdx]})</div>
    <input id="ex-inp" class="ex-input" placeholder="Escribe aquí..." autocomplete="off" onkeydown="if(event.key==='Enter')checkEx()">
    <button class="btn-primary" onclick="checkEx()" style="margin-top:10px">Comprobar</button>
    <div id="ex-fb" class="ex-feedback"></div>`;

  } else if(EX.type==='B') {
    const wrongs=VERBOS_TR.filter(v=>v.inf!==verb.inf).sort(()=>Math.random()-.5).slice(0,3).map(v=>v.es);
    const opts=[...wrongs,verb.es].sort(()=>Math.random()-.5);
    html+=`
    <div class="ex-prompt">¿Qué significa este verbo turco?</div>
    <div class="ex-verb-display"><span class="ex-verb-inf" style="font-size:1.5rem">${verb.inf}</span></div>
    <div class="ex-mc-grid">
      ${opts.map(o=>`<button class="ex-mc-btn" onclick="checkMC(this,'${o.replace(/'/g,"\\'")}','${verb.es.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>`;

  } else if(EX.type==='D') {
    const idxs=[0,1,2,3,4,5].sort(()=>Math.random()-.5).slice(0,4);
    const pairs=idxs.map(i=>({pron:TR_PRONS[i],form:fn(verb.inf,i)}));
    const shuffForms=[...pairs].sort(()=>Math.random()-.5);
    window._exPairs=pairs; window._exMatched={};
    html+=`
    <div class="ex-prompt">Une cada pronombre con su forma conjugada:</div>
    <div class="ex-verb-display"><span class="ex-verb-inf">${verb.inf}</span><span class="ex-verb-tr">${verb.es}</span> — <em>${tLabel}</em></div>
    <div class="ex-match-wrap">
      <div class="ex-match-col">${pairs.map(p=>`<div class="ex-match-card pron-card" data-pron="${p.pron}" onclick="selPron(this)">${p.pron}</div>`).join('')}</div>
      <div class="ex-match-col">${shuffForms.map(p=>`<div class="ex-match-card form-card" data-form="${p.form}" onclick="selForm(this)">${p.form}</div>`).join('')}</div>
    </div>
    <button class="btn-primary" onclick="checkMatch()">Comprobar</button>
    <div id="ex-fb" class="ex-feedback"></div>`;
  }

  html+=`</div>`;
  area.innerHTML=html;
  document.getElementById('ex-inp')?.focus();
}

function checkEx() {
  const inp=document.getElementById('ex-inp');
  if(!inp) return;
  const ok=inp.value.trim().toLowerCase()===EX._correct.toLowerCase();
  inp.classList.add(ok?'inp-correct':'inp-wrong'); inp.disabled=true;
  const fb=document.getElementById('ex-fb');
  if(fb){ fb.textContent=ok?'✅ ¡Correcto!':'❌ Correcto: '+EX._correct; fb.className='ex-feedback '+(ok?'fb-ok':'fb-err'); }
  if(ok) EX.score++;
  EX.q++;
  if(EX.q>=EX.total) EX.done=true;
  setTimeout(()=>{ inp.classList.remove('inp-correct','inp-wrong'); renderEx(); }, ok?900:1800);
}

function checkMC(btn, chosen, correct) {
  btn.parentElement.querySelectorAll('.ex-mc-btn').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('mc-correct');});
  const ok=chosen===correct;
  btn.classList.add(ok?'mc-correct':'mc-wrong');
  if(ok) EX.score++;
  EX.q++; if(EX.q>=EX.total) EX.done=true;
  setTimeout(()=>renderEx(), ok?900:1800);
}

let _selPron=null;
function selPron(el) { document.querySelectorAll('.pron-card').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); _selPron=el; }
function selForm(el) {
  if(!_selPron) return;
  window._exMatched[_selPron.dataset.pron]=el.dataset.form;
  _selPron.classList.remove('selected'); _selPron.classList.add('paired');
  el.classList.add('paired'); _selPron=null;
}
function checkMatch() {
  let ok=window._exPairs.every(p=>window._exMatched[p.pron]===p.form);
  const fb=document.getElementById('ex-fb');
  if(fb){ fb.textContent=ok?'✅ ¡Correcto!':'❌ Algunas respuestas son incorrectas'; fb.className='ex-feedback '+(ok?'fb-ok':'fb-err'); }
  if(ok) EX.score++;
  EX.q++; if(EX.q>=EX.total) EX.done=true;
  window._exMatched={};
  setTimeout(()=>renderEx(), ok?900:1800);
}

let FC={deck:[],idx:0,mode:'es-tr',filter:'all',known:new Set(),unknown:new Set(),flipped:false};
function initFC() { fcBuildDeck(); fcRender(); }
function fcBuildDeck() {
  FC.deck=FC.filter==='all'?[...VERBOS_TR]:VERBOS_TR.filter(v=>v.tipo===FC.filter);
  FC.idx=0; FC.flipped=false; FC.known=new Set(); FC.unknown=new Set();
}
function fcRender() {
  const v=FC.deck[FC.idx]; if(!v) return;
  const inner=document.getElementById('fc-inner'); if(inner) inner.style.transform='rotateY(0)';
  FC.flipped=false;
  const isTR=FC.mode==='tr-es';
  document.getElementById('fc-word').textContent=isTR?v.inf:v.es;
  document.getElementById('fc-trans').textContent=isTR?v.es:v.inf;
  document.getElementById('fc-tipo').textContent=v.tipo;
  const bar=document.getElementById('fc-stats');
  if(bar) bar.textContent=`${FC.known.size} conocidas · ${FC.unknown.size} para repasar`;
}
function fcFlip() { FC.flipped=!FC.flipped; const i=document.getElementById('fc-inner'); if(i) i.style.transform=FC.flipped?'rotateY(180deg)':'rotateY(0)'; }
function fcMark(s) {
  const v=FC.deck[FC.idx]; if(!v) return;
  if(s==='known') FC.known.add(v.id); else FC.unknown.add(v.id);
  FC.idx++;
  if(FC.idx>=FC.deck.length) {
    document.getElementById('fc-done')?.classList.remove('hidden');
    addXP(5);
    return;
  }
  fcRender();
}
function fcShuffle() { FC.deck.sort(()=>Math.random()-.5); FC.idx=0; fcRender(); }
function fcSetFilter(v) { FC.filter=v; fcBuildDeck(); fcRender(); }
function fcSetMode(v)   { FC.mode=v;   fcRender(); }
function fcRestart()    { document.getElementById('fc-done')?.classList.add('hidden'); fcBuildDeck(); fcRender(); }

  if(!res.length){box.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:24px">Sin resultados</p>';return;}

          </div>`).join('')}

      </div>

    return;
  }

  box.innerHTML=res.map(v=>`
    <div class="vsearch-card" onclick="document.getElementById('vs-inp').value='${v.inf}';renderVS('${v.inf}')">

        <div class="vsearch-pair">
          <span class="vsearch-pron">${p}</span>

function startDailyChallenge() {
  const today=new Date();
  const dayIdx=(today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate())%VERBOS_TR.length;
  const verb=VERBOS_TR[dayIdx];
  const fns=[conjugarTR_Simdiki,conjugarTR_Gecmis,conjugarTR_Genis];
  const fLabels=['Şimdiki Zaman','Geçmiş Zaman','Geniş Zaman'];
  let qs=[];
  fns.forEach((fn,fi)=>[0,1,2,3].forEach(i=>qs.push({verb,fn,pIdx:i,correct:fn(verb.inf,i),tenseLabel:fLabels[fi]})));
  qs=qs.sort(()=>Math.random()-.5).slice(0,10);
  let qi=0, score=0;

  let m=document.getElementById('dc-modal');
  if(!m){ m=document.createElement('div'); m.id='dc-modal'; m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:12px'; document.body.appendChild(m); }

  const render=()=>{
    if(qi>=qs.length) {
      const pct=Math.round(score/qs.length*100);
      m.innerHTML=`<div style="background:var(--bg-card);border-radius:var(--radius);padding:28px;max-width:420px;width:90vw;text-align:center">
        <div style="font-size:3rem">🎉</div>
        <div style="font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800">${pct}%</div>
        <div style="color:var(--text-muted);margin-bottom:16px">${score}/${qs.length} correctas</div>
        <button class="btn-primary" onclick="document.getElementById('dc-modal').remove();showPage('home')">Cerrar</button>
      </div>`;
      localStorage.setItem('vesp-tr-dc-'+today.toDateString(),'1');
      addXP(20); if(pct===100) launchConfetti();
      return;
    }
    const q=qs[qi];
    m.innerHTML=`<div style="background:var(--bg-card);border-radius:var(--radius);padding:24px;max-width:460px;width:90vw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:.9rem;color:var(--text-muted)">${qi+1}/${qs.length}</span>
        <button onclick="m.remove()" style="border:none;background:none;font-size:1.2rem;cursor:pointer">✕</button>
      </div>
      <div style="font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;margin-bottom:4px">🔥 Desafío del día</div>
      <div style="color:var(--text-muted);font-size:.88rem;margin-bottom:12px">${q.tenseLabel}</div>
      <div style="font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:2px">${q.verb.inf}</div>
      <div style="color:var(--text-muted);font-style:italic;margin-bottom:12px">${q.verb.es} — ${TR_PRONS[q.pIdx]}</div>
      <input id="dc-inp" class="ex-input" placeholder="Escribe la conjugación..." autocomplete="off" onkeydown="if(event.key==='Enter')dcCheck()">
      <button class="btn-primary" onclick="dcCheck()" style="margin-top:10px;width:100%">Comprobar</button>
      <div id="dc-fb" style="margin-top:8px;font-weight:700;min-height:22px"></div>
    </div>`;
    setTimeout(()=>document.getElementById('dc-inp')?.focus(),80);
    window._dcQ=q; window._dcScore=0;
  };

  window.dcCheck=function(){
    const inp=document.getElementById('dc-inp'); const fb=document.getElementById('dc-fb');
    if(!inp||!fb) return;
    const ok=inp.value.trim().toLowerCase()===window._dcQ.correct.toLowerCase();
    inp.disabled=true;
    fb.textContent=ok?'✅ ¡Correcto!':'❌ Correcto: '+window._dcQ.correct;
    fb.style.color=ok?'#18A34A':'#dc2626';
    if(ok) score++;
    qi++;
    setTimeout(render, ok?900:1800);
  };

  render();
}

function getStreak() {
  const done=getDailyData(), today=new Date(); today.setHours(0,0,0,0);
  const dSet=new Set(done); let s=0;
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(dSet.has(d.toDateString()))s++;else if(i>0)break;}
  return s;
}

function buildDaily() {
  const done=getDailyData(), today=new Date(); today.setHours(0,0,0,0);
  const dSet=new Set(done);
  let streak=0, longest=0, cur=0;
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(dSet.has(d.toDateString()))streak++;else if(i>0)break;}
  for(let i=364;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);if(dSet.has(d.toDateString())){cur++;longest=Math.max(longest,cur);}else cur=0;}
  const total=dSet.size, todayDone=dSet.has(today.toDateString());
  const dayIdx=(today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate())%VERBOS_TR.length;
  const verb=VERBOS_TR[dayIdx];
  const sEmoji=streak>=365?'👑':streak>=180?'🌟':streak>=100?'🚀':streak>=30?'🏆':streak>=7?'🔥':'🌱';
  const MILES=[{d:1,i:'🌱',l:'1er día'},{d:7,i:'🔥',l:'1 semana'},{d:30,i:'🏆',l:'1 mes'},{d:100,i:'🚀',l:'100 días'},{d:365,i:'👑',l:'1 año'}];

  return `<div class="page-wrap">
    <div class="dp-hero">
      <div class="dp-hero-left">
        <div class="dp-hero-title">🔥 Desafío del día</div>

        <span class="dp-streak-lbl">días</span>
      </div>
    </div>
    <div class="dp-stats-row">
      <div class="dp-stat"><div class="dp-stat-icon">${sEmoji}</div><div class="dp-stat-val">${streak}</div><div class="dp-stat-lbl">Racha actual</div></div>
      <div class="dp-stat"><div class="dp-stat-icon">🏅</div><div class="dp-stat-val">${longest}</div><div class="dp-stat-lbl">Racha más larga</div></div>
      <div class="dp-stat"><div class="dp-stat-icon">📅</div><div class="dp-stat-val">${total}</div><div class="dp-stat-lbl">Días completados</div></div>
      <div class="dp-stat"><div class="dp-stat-icon">🎯</div><div class="dp-stat-val">${Math.round(total/365*100)}%</div><div class="dp-stat-lbl">Meta 365 días</div></div>
    </div>
    <div class="dp-today ${todayDone?'dp-today-done':''}">
      <div class="dp-today-left">
        <div class="dp-today-badge">${todayDone?'✅':'🎯'}</div>
        <div>
          <div class="dp-today-label">Verbo de hoy</div>
          <div class="dp-today-verb">${verb.inf} <span class="dp-today-tr">· ${verb.es}</span></div>
          <div class="dp-today-status">${todayDone?'¡Completado hoy! 🎉':'Esperando — ¡empieza ahora!'}</div>
        </div>
      </div>

    </div>
    <div class="dp-cal-section">
      <div class="cal-view-tabs">
        <button class="cal-view-tab active" onclick="switchCal('weekly',this)">📅 Semanal</button>

            <div class="dp-mile-label">${m.l}</div>
            ${!done2?`<div class="dp-mile-progress"><div class="dp-mile-fill" style="width:${pct}%"></div></div>`:''}
          </div>`;
        }).join('')}

let _calOffset=0;
function switchCal(v,btn) {
  document.querySelectorAll('.cal-view-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  const done=getDailyData(), today=new Date(); today.setHours(0,0,0,0);
  const dSet=new Set(done); const box=document.getElementById('cal-content'); if(!box) return;
  if(v==='weekly')  box.innerHTML=calWeekly(dSet,today);
  if(v==='monthly') { _calOffset=0; box.innerHTML=calMonthly(dSet,today,0); }
  if(v==='yearly')  box.innerHTML=calYearly(dSet,today);
}
function calWeekly(dSet,today) {
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dow=today.getDay(), off=dow===0?6:dow-1;
  const cells=[]; for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-off+i);cells.push(d);}
  const wd=cells.filter(d=>dSet.has(d.toDateString())).length;
  return `<div style="margin-bottom:8px;font-size:.85rem;color:var(--text-muted);font-weight:700">Esta semana: <span style="color:var(--primary)">${wd}/7 días</span></div>
  <div class="cal-week-grid">${cells.map(d=>{
    const done2=dSet.has(d.toDateString()), isT=d.toDateString()===today.toDateString();
    return `<div class="cal-week-cell ${done2?'done':''} ${isT?'today':''}">
      <div class="cal-week-day">${DAYS[d.getDay()]}</div>
      <div class="cal-week-date">${d.getDate()}</div>
      <div class="cal-week-dot">${done2?'✅':isT?'🎯':'·'}</div>
    </div>`;
  }).join('')}</div>`;
}
function calMonthly(dSet,today,off) {
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DN=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const ref=new Date(today.getFullYear(),today.getMonth()+off,1);
  const yr=ref.getFullYear(),mo=ref.getMonth();
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  const pad=(first.getDay()+6)%7;
  const cells=[]; for(let i=0;i<pad;i++) cells.push(null); for(let d=1;d<=last.getDate();d++) cells.push(new Date(yr,mo,d));
  const mDone=cells.filter(d=>d&&dSet.has(d.toDateString())).length;
  const getD="new Set(getDailyData())", getT="(()=>{const t=new Date();t.setHours(0,0,0,0);return t;})()";
  return `<div class="cal-month-nav">
    <button class="cal-month-nav-btn" ${off>-11?'':'disabled'} onclick="_calOffset--;document.getElementById('cal-content').innerHTML=calMonthly(${getD},${getT},_calOffset)">◀</button>
    <span class="cal-month-name">${MN[mo]} ${yr}</span>
    <button class="cal-month-nav-btn" ${off<0?'':'disabled'} onclick="_calOffset++;document.getElementById('cal-content').innerHTML=calMonthly(${getD},${getT},_calOffset)">▶</button>
  </div>
  <div style="margin-bottom:6px;font-size:.85rem;color:var(--text-muted);font-weight:700">${MN[mo]}: <span style="color:var(--primary)">${mDone}/${last.getDate()} días</span></div>
  <div class="cal-month-grid">
    ${DN.map(d=>`<div class="cal-month-hdr">${d}</div>`).join('')}
    ${cells.map(d=>{
      if(!d) return `<div class="cal-month-cell empty"></div>`;
      const done2=dSet.has(d.toDateString()), isT=d.toDateString()===today.toDateString();
      return `<div class="cal-month-cell ${done2?'done':''} ${isT?'today':''}">${d.getDate()}</div>`;
    }).join('')}
  </div>`;
}
function calYearly(dSet,today) {
  const MO=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const DL=['L','M','X','J','V','S','D'];
  const cells=[]; for(let i=364;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);cells.push({date:d,done:dSet.has(d.toDateString()),isToday:i===0});}
  const pad=(cells[0].date.getDay()+6)%7;
  const weeks=[]; let wk=Array(pad).fill(null);
  cells.forEach(c=>{wk.push(c);if(wk.length===7){weeks.push(wk);wk=[];}});
  if(wk.length){while(wk.length<7)wk.push(null);weeks.push(wk);}
  const ml=Array(weeks.length).fill(''); let lm=-1;
  weeks.forEach((w,wi)=>{const f=w.find(c=>c);if(f&&f.date.getMonth()!==lm){ml[wi]=MO[f.date.getMonth()];lm=f.date.getMonth();}});
  const ch=c=>{if(!c)return`<div class="dc-cell dc-cell-empty"></div>`;const cl=c.done?'dc-cell-done':c.isToday?'dc-cell-today':'';return`<div class="dc-cell ${cl}"></div>`;};
  const yr=cells.filter(c=>c&&c.done).length;
  return `<div style="margin-bottom:8px;font-size:.85rem;color:var(--text-muted);font-weight:700">Últimos 365 días: <span style="color:var(--primary)">${yr}/365</span></div>
  <div class="dp-cal-scroll">
    <div class="dc365-month-row">${ml.map(m=>`<div class="dc365-month-lbl">${m}</div>`).join('')}</div>
    <div class="dc365-grid-row">
      <div class="dc365-day-labels">${DL.map((d,i)=>`<div class="dc365-day-lbl">${i%2===0?d:''}</div>`).join('')}</div>
      <div class="dc365-cols">${weeks.map(w=>`<div class="dc365-col">${w.map(ch).join('')}</div>`).join('')}</div>
    </div>
  </div>`;
}
